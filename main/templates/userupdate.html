{% extends 'userbase.html' %}
{% block title %}Update user{% endblock %}
{% block body %}
    {{block.super}}
    <form method="post" action="">
        {% csrf_token %}
        <table cellpadding="10" cellspacing="10">
            <tr><td>Username</td><td>Superuser</td></tr>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>
                    <input type="checkbox" 
                           name="is_superuser_{{ user.id }}" 
                           id="is_superuser_{{ user.id }}"
                           {% if user.is_superuser %}checked{% endif %}>
                </td>
            </tr>
            {% endfor %}
        </table>
        <input type="submit" value="Update" class="btn btn-primary">
    </form>
{% endblock %}
