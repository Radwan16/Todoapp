{%extends 'base.html'%}
{%block title%}Create Projects{%endblock%}
{%block body%}

    <form method="post" action="">
        {% csrf_token %}
        <input type="text" name="projectName" required><br/>

        {% for manager in managers %}

        {% endfor %}
        <button type="submit">Utwórz</button>
    </form>
{%endblock%}
